<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700&amp;family=Inter:wght@400;500;600&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                "outline": "#8c909f",
                "surface-bright": "#363940",
                "tertiary-fixed-dim": "#4edea3",
                "outline-variant": "#424754",
                "surface": "#10131a",
                "on-secondary": "#213145",
                "on-surface-variant": "#c2c6d6",
                "inverse-surface": "#e1e2eb",
                "surface-container-lowest": "#0b0e14",
                "on-tertiary-fixed": "#002113",
                "on-tertiary-fixed-variant": "#005236",
                "surface-variant": "#32353c",
                "on-tertiary": "#003824",
                "on-error": "#690005",
                "surface-container-high": "#272a31",
                "background": "#10131a",
                "on-secondary-fixed-variant": "#38485d",
                "inverse-on-surface": "#2e3037",
                "primary-container": "#4d8eff",
                "primary-fixed-dim": "#adc6ff",
                "on-primary-fixed-variant": "#004395",
                "secondary": "#b7c8e1",
                "on-secondary-container": "#a9bad3",
                "secondary-container": "#3a4a5f",
                "on-primary": "#002e6a",
                "on-surface": "#e1e2eb",
                "secondary-fixed-dim": "#b7c8e1",
                "primary": "#adc6ff",
                "surface-container-low": "#191c22",
                "surface-dim": "#10131a",
                "surface-container-highest": "#32353c",
                "error-container": "#93000a",
                "inverse-primary": "#005ac2",
                "tertiary": "#4edea3",
                "tertiary-fixed": "#6ffbbe",
                "on-error-container": "#ffdad6",
                "on-background": "#e1e2eb",
                "on-primary-container": "#00285d",
                "secondary-fixed": "#d3e4fe",
                "tertiary-container": "#00a572",
                "surface-tint": "#adc6ff",
                "on-tertiary-container": "#00311f",
                "surface-container": "#1d2026",
                "error": "#ffb4ab",
                "primary-fixed": "#d8e2ff",
                "on-primary-fixed": "#001a42",
                "on-secondary-fixed": "#0b1c30"
            },
            "borderRadius": {
                "DEFAULT": "0.125rem",
                "lg": "0.25rem",
                "xl": "0.5rem",
                "full": "0.75rem"
            },
            "spacing": {
                "container-padding": "24px",
                "compact-row": "8px",
                "unit": "4px",
                "gutter": "16px",
                "widget-gap": "12px"
            },
            "fontFamily": {
                "label-caps": ["Inter"],
                "data-mono": ["JetBrains Mono"],
                "body-sm": ["Inter"],
                "headline-lg-mobile": ["Hanken Grotesk"],
                "display-lg": ["Hanken Grotesk"],
                "body-md": ["Inter"],
                "headline-lg": ["Hanken Grotesk"]
            },
            "fontSize": {
                "label-caps": ["11px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                "data-mono": ["13px", {"lineHeight": "16px", "letterSpacing": "-0.01em", "fontWeight": "500"}],
                "body-sm": ["12px", {"lineHeight": "18px", "fontWeight": "400"}],
                "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600"}]
            }
          },
        },
      }
    </script>
<style>
        body {
            background: radial-gradient(circle at 50% 50%, #151921 0%, #0b0e14 100%);
            overflow: hidden;
        }
        .glass-panel {
            background: rgba(25, 28, 34, 0.6);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .data-pattern {
            background-image: radial-gradient(rgba(77, 142, 255, 0.15) 1px, transparent 1px);
            background-size: 32px 32px;
        }
        .jwt-glow {
            box-shadow: 0 0 15px rgba(78, 222, 163, 0.2);
        }
    </style>
</head>
<body class="bg-background text-on-surface flex items-center justify-center min-h-screen">
<!-- Subtle Background Elements -->
<div class="fixed inset-0 data-pattern opacity-30 pointer-events-none"></div>
<div class="fixed top-[-10%] right-[-5%] w-[600px] h-[600px] bg-primary/10 rounded-full blur-[120px] pointer-events-none"></div>
<div class="fixed bottom-[-10%] left-[-5%] w-[600px] h-[600px] bg-tertiary/10 rounded-full blur-[120px] pointer-events-none"></div>
<main class="relative z-10 w-full max-w-md px-container-padding">
<!-- Brand Header -->
<div class="text-center mb-10">
<div class="inline-flex items-center justify-center mb-6">
<div class="w-12 h-12 bg-primary flex items-center justify-center rounded-lg mr-4">
<span class="material-symbols-outlined text-on-primary text-3xl" style="font-variation-settings: 'FILL' 1;">terminal</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-primary tracking-tight">Demo Capital</h1>
</div>
<div class="inline-flex items-center px-3 py-1 rounded-full bg-surface-container-high border border-outline-variant">
<span class="material-symbols-outlined text-[14px] text-tertiary mr-2" style="font-variation-settings: 'FILL' 1;">verified_user</span>
<span class="font-label-caps text-label-caps text-on-surface-variant uppercase">Secure Enterprise Access</span>
</div>
</div>
<!-- Login Card -->
<div class="glass-panel rounded-xl p-8 transition-all duration-500 hover:border-primary/30">
<form class="space-y-6" onsubmit="event.preventDefault();">
<!-- Identity Input -->
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-on-surface-variant block ml-1">Terminal Identity</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[18px]">alternate_email</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg py-3 pl-10 pr-4 text-on-surface placeholder:text-outline focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary/20 transition-all font-body-md" placeholder="institutional-email@democapital.example" type="email"/>
</div>
</div>
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-on-surface-variant block ml-1">Passcode</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[18px]">lock</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg py-3 pl-10 pr-4 text-on-surface placeholder:text-outline focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary/20 transition-all font-body-md" placeholder="••••••••••••" type="password"/>
</div>
</div>
<!-- Role Selector -->
<div class="space-y-3">
<label class="font-label-caps text-label-caps text-on-surface-variant block ml-1">Contextual Demo Role</label>
<div class="grid grid-cols-2 gap-2">
<button class="flex items-center p-3 rounded-lg bg-surface-container-low border border-outline-variant hover:border-primary/50 hover:bg-secondary-container/20 transition-all group active:scale-95" type="button">
<span class="material-symbols-outlined text-[20px] text-primary mr-3">query_stats</span>
<span class="font-body-sm text-body-sm text-on-surface">Analyst</span>
</button>
<button class="flex items-center p-3 rounded-lg bg-surface-container-low border border-outline-variant hover:border-primary/50 hover:bg-secondary-container/20 transition-all group active:scale-95" type="button">
<span class="material-symbols-outlined text-[20px] text-error mr-3">security</span>
<span class="font-body-sm text-body-sm text-on-surface">Risk Officer</span>
</button>
<button class="flex items-center p-3 rounded-lg bg-surface-container-low border border-outline-variant hover:border-primary/50 hover:bg-secondary-container/20 transition-all group active:scale-95" type="button">
<span class="material-symbols-outlined text-[20px] text-tertiary mr-3">account_balance_wallet</span>
<span class="font-body-sm text-body-sm text-on-surface">Portfolio Mgr</span>
</button>
<button class="flex items-center p-3 rounded-lg bg-surface-container-low border border-outline-variant hover:border-primary/50 hover:bg-secondary-container/20 transition-all group active:scale-95" type="button">
<span class="material-symbols-outlined text-[20px] text-outline mr-3">school</span>
<span class="font-body-sm text-body-sm text-on-surface">Intern</span>
</button>
</div>
</div>
<a href="executive.html" class="w-full bg-primary hover:bg-primary-container text-on-primary font-bold py-4 rounded-lg flex items-center justify-center transition-all group">
<span class="mr-2">Initialize Session</span>
<span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</a>
</form>
</div>
<!-- JWT Indicator Footer -->
<div class="mt-8 flex flex-col items-center">
<div class="flex items-center space-x-3 bg-surface-container-lowest/50 px-4 py-2 rounded-full border border-outline-variant jwt-glow">
<div class="flex space-x-1">
<span class="w-2 h-2 rounded-full bg-tertiary animate-pulse"></span>
<span class="w-2 h-2 rounded-full bg-tertiary/60 animate-pulse delay-75"></span>
<span class="w-2 h-2 rounded-full bg-tertiary/30 animate-pulse delay-150"></span>
</div>
<span class="font-data-mono text-data-mono text-tertiary uppercase text-[10px]">JWT Authentication Ready</span>
<span class="font-data-mono text-data-mono text-outline text-[10px] border-l border-outline-variant pl-3">v2.4.12-secure</span>
</div>
<div class="mt-6 flex space-x-6">
<a class="font-label-caps text-label-caps text-outline hover:text-primary transition-colors" href="#">Privacy Policy</a>
<a class="font-label-caps text-label-caps text-outline hover:text-primary transition-colors" href="#">Regulatory Disclosure</a>
</div>
</div>
</main>
<!-- Background Decoration Image (Abstract Data) -->
<div class="fixed inset-0 z-0 opacity-10 pointer-events-none overflow-hidden">
<img class="w-full h-full object-cover grayscale mix-blend-screen" data-alt="An abstract visualization of complex financial data flows and network nodes in a deep space setting. The aesthetic is sophisticated and institutional, featuring glowing particles and interconnected geometric lines that suggest global connectivity and algorithmic intelligence. The color palette is dominated by deep blacks, slate greys, and pulsing neon blue accents, reflecting a high-end dark mode fintech environment." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDgVdi3c9lM0rv7MCNKOuc2LdLWSb9olaLzg2i-V4wREGq_-bI8zkTEP20obTl_y-hJy38lrZt2yPBoPN9KyEakDIDAqGjap5omLhy7OMEhTMg3E776DbiX6c0zGdBzz-kUchp7s9iFUdjRCeUFJv0J8k4DxdXUU3l_MFIwkumolNy37bkNiP8CzTu06fSUXioYdSblHD6yssa8DIE8aPd21wIGjXynb0AGTC7Y5M_XMFNX5BWvrqaj-QjB9rYmsNUPCXdJUR_4hsk"/>
</div>
<script>
        // Micro-interactions for buttons
        document.querySelectorAll('button[type="button"]').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('button[type="button"]').forEach(b => {
                    b.classList.remove('border-primary', 'bg-primary/5');
                });
                btn.classList.add('border-primary', 'bg-primary/5');
            });
        });

        // Atmospheric mouse effect
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            document.body.style.background = `radial-gradient(circle at ${x * 100}% ${y * 100}%, #1a202c 0%, #0b0e14 100%)`;
        });
    </script>
</body></html>
