name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    env:
      # Tests force the mock LLM provider — no Ollama needed in CI.
      LLM_PROVIDER: mock
      JWT_SECRET: ci-test-secret
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint (ruff)
        run: ruff check backend tests

      - name: Run tests
        run: pytest -q

  docker-build:
    name: Docker build (smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t demo-backend -f Dockerfile .
      - name: Build dashboard image
        run: docker build -t demo-dashboard -f dashboard/Dockerfile .
